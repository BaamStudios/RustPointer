<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src ws: wss: http: https:;" />
  <title>Presenter-Cursor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1e1f24;
      --panel: #2a2b32;
      --border: #3a3b44;
      --text: #e6e7eb;
      --muted: #8b8d96;
      --accent: #4f8cff;
      --ok: #3cc878;
      --warn: #ffb84d;
      --err: #ff5a5a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 13px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }
    h1 { font-size: 16px; margin: 0 0 12px; }
    h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 16px 0 6px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    label { display: block; margin: 6px 0 4px; color: var(--muted); }
    input[type=text], select {
      width: 100%;
      background: #1a1b20;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 6px;
      font: inherit;
    }
    input[type=text]:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      background: var(--accent);
      color: white;
      border: 0;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }
    button.secondary {
      background: #393b46;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .row { display: flex; gap: 8px; align-items: center; }
    .row > * { flex: 1; }
    .row > button { flex: 0 0 auto; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.ok { background: rgba(60,200,120,0.15); color: var(--ok); }
    .badge.err { background: rgba(255,90,90,0.15); color: var(--err); }
    .badge.warn { background: rgba(255,184,77,0.15); color: var(--warn); }
    .modes { display: flex; gap: 6px; }
    .modes button {
      flex: 1;
      background: #393b46;
      color: var(--text);
    }
    .modes button.active {
      background: var(--accent);
      color: white;
    }
    .status-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }
    .muted { color: var(--muted); }
    .small { font-size: 11px; }
    code {
      background: #1a1b20;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h1>Presenter-Cursor</h1>

  <div class="panel">
    <h2>Verbindung</h2>
    <label for="server">Signal-Server URL</label>
    <input id="server" type="text" placeholder="ws://localhost:3000" value="ws://localhost:3000" />
    <label for="room">Room-ID</label>
    <input id="room" type="text" placeholder="z.B. test123" value="test123" />
    <div class="row" style="margin-top: 10px;">
      <button id="connectBtn">Verbinden</button>
      <button id="disconnectBtn" class="secondary" disabled>Trennen</button>
    </div>
    <div class="status-line" style="margin-top: 10px;">
      <span class="muted">Signal-Server:</span>
      <span id="wsStatus" class="badge err">getrennt</span>
    </div>
    <div class="status-line">
      <span class="muted">Peer (P2P):</span>
      <span id="peerStatus" class="badge err">getrennt</span>
    </div>
  </div>

  <div class="panel">
    <h2>Modus</h2>
    <div class="modes">
      <button data-mode="sender">Sender</button>
      <button data-mode="receiver">Receiver</button>
      <button data-mode="both">Bidirektional</button>
    </div>
    <div class="status-line" style="margin-top: 10px;">
      <span class="muted">Presenter-Modus:</span>
      <span id="presenterStatus" class="badge err">aus</span>
    </div>
    <div class="row" style="margin-top: 8px;">
      <button id="presenterToggle" class="secondary">Presenter EIN/AUS</button>
    </div>
    <p class="small muted" style="margin: 6px 0 0;">
      Sender-Tipp: Linke Maustaste im RustDesk-Fenster gedrückt halten und bewegen → Laser sichtbar.
    </p>
  </div>

  <div class="panel">
    <h2>RustDesk-Fenster</h2>
    <label for="targetTitle">Fenstertitel enthält</label>
    <div class="row">
      <input id="targetTitle" type="text" value="RustDesk" />
      <button id="applyTitleBtn" class="secondary">Setzen</button>
    </div>
    <label for="windowSelect" style="margin-top: 8px;">Manuelle Auswahl (überschreibt Titel-Suche)</label>
    <div class="row">
      <select id="windowSelect">
        <option value="">— automatisch erkennen —</option>
      </select>
      <button id="refreshWindowsBtn" class="secondary">Neu laden</button>
    </div>
    <div class="status-line" style="margin-top: 10px;">
      <span class="muted">Erkannte Bounds:</span>
      <span id="boundsStatus" class="muted small">—</span>
    </div>
  </div>

  <script src="control.js"></script>
</body>
</html>
