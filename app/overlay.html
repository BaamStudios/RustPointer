<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Presenter Overlay</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="overlay"></canvas>
  <script src="overlay.js"></script>
</body>
</html>
